<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Bhogram Al-Hidayet Mission</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-header {
            background: linear-gradient(135deg, #FF7675 0%, #fab1a0 100%);
            color: #fff;
            padding: 40px;
            border-radius: var(--radius);
            margin-bottom: 40px;
            text-align: center;
        }

        .profile-avatar-lg {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .profile-avatar-lg img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #2d3436;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #fff;
        }
    </style>
</head>

<body class="bg-pattern" style="background-color: #F7F9FC;">

    <header class="main-header" style="background: #fff;">
        <div class="container header-container">
            <div class="logo">
                <a href="/dashboard"
                    style="display:flex; align-items:center; gap:10px; color: #333; text-decoration: none;">
                    <i data-lucide="arrow-left"></i>
                    <span class="logo-text">Back to <span class="highlight">Dashboard</span></span>
                </a>
            </div>
            <div class="header-cta">
                <a href="/logout" class="btn btn-outline" style="border-color: #e17055; color: #e17055;">Logout</a>
            </div>
        </div>
    </header>

    <div class="container section">

        <div class="profile-header">
            <div class="profile-avatar-lg">
                <img src="{{ session.get('avatar_url', logo_url) }}" alt="Profile Pic">
                <label for="avatar-upload" class="profile-edit-btn">
                    <i data-lucide="camera" style="width: 16px;"></i>
                </label>
            </div>
            <h1 style="font-size: 28px; margin-bottom: 5px;">{{ session['user'] }}</h1>
            <p style="opacity: 0.9;">{{ user_email }}</p>

            <!-- Hidden Form for Avatar Upload -->
            <form id="avatar-form" action="/profile/upload-avatar" method="POST" enctype="multipart/form-data"
                style="display: none;">
                <input type="file" id="avatar-upload" name="avatar" accept="image/*"
                    onchange="document.getElementById('avatar-form').submit()">
            </form>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div
            style="background: #fff; border-left: 4px solid #00b894; padding: 15px; border-radius: 4px; margin-bottom: 30px; box-shadow: var(--shadow-sm);">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr;">
            <!-- Change Password -->
            <div class="dash-card" style="text-align: left; border-color: #6c5ce7;">
                <h3 style="color: #6c5ce7; margin-bottom: 20px;"><i data-lucide="lock"></i> Change Password</h3>
                <form action="/profile/update-security" method="POST">
                    <input type="hidden" name="action" value="change_password">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label style="font-size: 14px; color: #666;">Current Password</label>
                        <input type="password" name="current_password" required
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;">
                    </div>
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="font-size: 14px; color: #666;">New Password</label>
                        <input type="password" name="new_password" required
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;">
                    </div>
                    <button type="submit" class="auth-btn" style="width: 100%;">Update Password</button>
                </form>
            </div>

            <!-- Update Email -->
            <div class="dash-card" style="text-align: left; border-color: #00b894;">
                <h3 style="color: #00b894; margin-bottom: 20px;"><i data-lucide="mail"></i> Update Email</h3>
                <form action="/profile/update-security" method="POST">
                    <input type="hidden" name="action" value="update_email">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label style="font-size: 14px; color: #666;">Verify Password</label>
                        <input type="password" name="current_password" required
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;">
                    </div>
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="font-size: 14px; color: #666;">New Email Address</label>
                        <input type="email" name="new_email" required
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;"
                            value="{{ user_email }}">
                    </div>
                    <button type="submit" class="auth-btn" style="width: 100%;">Update Email</button>
                </form>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
