<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Under Maintenance - AHM Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 50px 40px;
            max-width: 600px;
            margin: 80px auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
            font-family: 'Outfit', sans-serif;
        }
        .error-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff8f8;
            color: #ff7675;
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }
        .error-title {
            color: #2d3436;
            margin-bottom: 15px;
            font-size: 28px;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
        }
        .error-message {
            color: #636e72;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 118, 117, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 118, 117, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 118, 117, 0);
            }
        }
    </style>
</head>
<body class="bg-pattern" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 50%, rgba(9, 132, 227, 0.03) 0%, rgba(246, 248, 251, 1) 100%);">
    <div class="error-card">
        <div class="error-icon">
            <i data-lucide="wrench" style="width: 40px; height: 40px;"></i>
        </div>
        <h1 class="error-title">Server Under Maintenance</h1>
        <p class="error-message">
            We are currently performing scheduled system updates to improve your portal experience. The technical team has been automatically notified. Please check back in a few minutes.
        </p>
        
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="/dashboard" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none;">
                <i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i> Go to Dashboard
            </a>
            <a href="/" class="btn btn-outline" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none;">
                <i data-lucide="home" style="width: 18px; height: 18px;"></i> Go to Home
            </a>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
